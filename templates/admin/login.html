<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin - Iniciar Sesión</title>
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #0b1421; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 40px; width: 360px; }
h1 { color: #fff; font-size: 1.25rem; margin-bottom: 24px; text-align: center; }
label { color: rgba(255,255,255,0.6); font-size: 0.8rem; display: block; margin-bottom: 6px; }
input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; font-size: 0.9rem; margin-bottom: 16px; }
input:focus { outline: none; border-color: #3b82f6; }
button { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #3b82f6; color: #fff; font-size: 0.9rem; cursor: pointer; font-weight: 600; }
button:hover { background: #2563eb; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 16px; text-align: center; }
.hint { color: rgba(255,255,255,0.25); font-size: 0.7rem; text-align: center; margin-top: 16px; }
</style>
</head>
<body>
<div class="login-card">
<h1>Panel de Administración</h1>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="post" id="login-form">
<label for="password">Contraseña de administrador</label>
<input type="password" name="password" id="password" placeholder="Ingrese la contraseña" autofocus required>
<button type="submit" id="btn-ingresar" {% if bloqueado %}disabled{% endif %}>{% if bloqueado %}Bloqueado ({{ minutos_restantes }} min){% else %}Ingresar{% endif %}</button>
</form>
<p class="hint">Solo personal autorizado.</p>
</div>
</body>
</html>
