name: ETL Mensual

on:
  schedule:
    - cron: "0 10 1 * *"
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
      - name: Notificar fallo
        if: failure()
        run: |
          echo "ETL falló — verifica logs en Render Dashboard"
